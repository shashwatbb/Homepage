<!DOCTYPE html>
<html lang="en" class="no-fouc">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Property details — Housing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      html.no-fouc *,
      html.no-fouc *::before,
      html.no-fouc *::after {
        transition: none !important;
        animation-duration: 0s !important;
        animation-delay: 0s !important;
      }
    </style>
    <link rel="stylesheet" href="/src/styles/base.css" />
    <script>
      try {
        if (sessionStorage.getItem("pdp-m-from-srp") === "1") {
          document.documentElement.classList.add("pdp-m-enter-pending");
        }
      } catch (_) {}
    </script>
    <script type="module" src="/src/pdp-mobile-main.js"></script>
  </head>
  <body>
    <div id="app" class="pdp-m-page">
      <div id="pdp-m-desktop-notice" class="pdp-m-desktop-notice">
        <div class="pdp-m-desktop-notice__card">
          <p class="pdp-m-desktop-notice__title">Open in mobile</p>
          <p class="pdp-m-desktop-notice__shortcut"><kbd>Cmd</kbd> + <kbd>Option</kbd> + <kbd>I</kbd></p>
          <p class="pdp-m-desktop-notice__hint"><a href="/srp.html">Back to search results</a></p>
        </div>
      </div>
      <div id="pdp-m-root" class="pdp-m-root" aria-busy="true"></div>
    </div>
  </body>
</html>

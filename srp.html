<!DOCTYPE html>
<html lang="en" class="no-fouc">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search results — Housing</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      html.no-fouc *,
      html.no-fouc *::before,
      html.no-fouc *::after {
        transition: none !important;
        animation-duration: 0s !important;
        animation-delay: 0s !important;
      }
    </style>
    <link rel="stylesheet" href="/src/styles/base.css" />
    <script type="module" src="/src/srp-main.js"></script>
  </head>
  <body>
    <div id="app" class="app-shell srp-page">
      <!-- Header: desktop/web only. Hidden below 48rem via CSS (SRP mobile flow has no header). -->
      <header class="site-header">
        <div class="layout-container site-header__bar">
          <div class="site-header__lead">
            <a class="site-header__brand" href="/" aria-label="Housing — Home">
              <img class="site-header__logo" src="/logo.svg" width="48" height="48" alt="" decoding="async" />
            </a>
            <span class="site-header__lead-sep" aria-hidden="true"></span>
            <div class="site-header__location-wrap">
              <button
                type="button"
                class="site-header__location"
                id="site-header-location-trigger"
                aria-haspopup="dialog"
                aria-expanded="false"
                aria-controls="site-header-location-panel"
                aria-label="Location: Mumbai. Change city"
              >
                <span class="site-header__location-stack">
                  <span class="site-header__location-icon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256">
                      <path
                        d="M128,64a40,40,0,1,0,40,40A40,40,0,0,0,128,64Zm0,64a24,24,0,1,1,24-24A24,24,0,0,1,128,128Zm0-112a88.1,88.1,0,0,0-88,88c0,31.4,14.51,64.68,42,96.25a254.19,254.19,0,0,0,41.45,38.3,8,8,0,0,0,9.18,0A254.19,254.19,0,0,0,174,200.25c27.45-31.57,42-64.85,42-96.25A88.1,88.1,0,0,0,128,16Zm0,206c-16.53-13-72-60.75-72-118a72,72,0,0,1,144,0C200,161.23,144.53,209,128,222Z"
                      />
                    </svg>
                  </span>
                  <span class="site-header__location-kicker">Searching in</span>
                  <span class="site-header__location-city-row">
                    <span class="site-header__location-city" id="site-header-location-city-label">Mumbai</span>
                    <span class="site-header__location-chevron" aria-hidden="true">
                      <svg xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6" fill="none">
                        <path d="M1 1.5L5 4.5L9 1.5" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" />
                      </svg>
                    </span>
                  </span>
                </span>
              </button>
            </div>
          </div>
          <nav class="site-header__nav" aria-label="Browse">
            <ul class="site-header__nav-list">
              <li>
                <button type="button" class="site-header__nav-trigger" data-header-nav="buyers" aria-expanded="false" aria-haspopup="menu">
                  <span class="site-header__nav-label">Buyers</span>
                </button>
              </li>
              <li>
                <button type="button" class="site-header__nav-trigger" data-header-nav="tenants" aria-expanded="false" aria-haspopup="menu">
                  <span class="site-header__nav-label">Tenants</span>
                </button>
              </li>
              <li>
                <button type="button" class="site-header__nav-trigger" data-header-nav="sellers" aria-expanded="false" aria-haspopup="menu">
                  <span class="site-header__nav-label">Sellers</span>
                </button>
              </li>
              <li>
                <button type="button" class="site-header__nav-trigger" data-header-nav="services" aria-expanded="false" aria-haspopup="menu">
                  <span class="site-header__nav-label">Services</span>
                </button>
              </li>
              <li class="site-header__nav-item-get-app">
                <a class="site-header__nav-trigger site-header__nav-get-app" href="#" aria-label="Get the Housing app">
                  <span class="site-header__nav-label">Get app</span>
                </a>
              </li>
            </ul>
          </nav>
          <div class="site-header__actions">
            <a
              class="site-header__nav-trigger site-header__nav-get-app site-header__nav-get-app--toolbar-only site-header__toolbar-cta"
              href="#"
              aria-label="Get the Housing app"
            >
              <span class="site-header__nav-label">Get app</span>
            </a>
            <button type="button" class="site-header__post-property-btn site-header__toolbar-cta">
              <span class="site-header__post-property-label">Post property</span>
              <span class="site-header__post-property-free" title="Free to post" aria-hidden="true">FREE</span>
            </button>
            <button type="button" class="site-header__login-btn site-header__toolbar-cta">Login</button>
          </div>
        </div>
      </header>

      <!-- SRP is mobile-only. Shown above 48rem (hidden by default via CSS). -->
      <div id="srp-desktop-notice" class="srp-desktop-notice">
        <div class="srp-desktop-notice__card">
          <p class="srp-desktop-notice__title">Open in mobile</p>
          <p class="srp-desktop-notice__shortcut"><kbd>Cmd</kbd> + <kbd>Option</kbd> + <kbd>I</kbd></p>
        </div>
      </div>

      <!-- Mobile-only content below. Hidden above 48rem via CSS. -->
      <div id="srp-mobile-content" class="srp-mobile-content">
        <div id="srp-skeleton" class="srp-skeleton" aria-busy="true" aria-label="Loading search results">
          <div class="srp-skeleton__search">
            <div class="srp-skeleton__search-field srp-skeleton__shine" aria-hidden="true"></div>
          </div>
          <div class="srp-skeleton__filters" aria-hidden="true">
            <div class="srp-skeleton__chip srp-skeleton__chip--sort srp-skeleton__shine"></div>
            <div class="srp-skeleton__chip srp-skeleton__chip--wide srp-skeleton__shine"></div>
            <div class="srp-skeleton__chip srp-skeleton__chip--mid srp-skeleton__shine"></div>
            <div class="srp-skeleton__chip srp-skeleton__chip--mid srp-skeleton__shine"></div>
          </div>
          <div class="srp-skeleton__cards" aria-hidden="true">
            <div class="srp-skeleton__card">
              <div class="srp-skeleton__image srp-skeleton__shine"></div>
              <div class="srp-skeleton__line srp-skeleton__line--sm srp-skeleton__shine"></div>
              <div class="srp-skeleton__line srp-skeleton__line--md srp-skeleton__shine"></div>
              <div class="srp-skeleton__line srp-skeleton__line--lg srp-skeleton__shine"></div>
              <div class="srp-skeleton__line srp-skeleton__line--xl srp-skeleton__shine"></div>
              <div class="srp-skeleton__cta srp-skeleton__shine"></div>
            </div>
            <div class="srp-skeleton__card">
              <div class="srp-skeleton__image srp-skeleton__shine"></div>
              <div class="srp-skeleton__line srp-skeleton__line--sm srp-skeleton__shine"></div>
              <div class="srp-skeleton__line srp-skeleton__line--md srp-skeleton__shine"></div>
              <div class="srp-skeleton__line srp-skeleton__line--lg srp-skeleton__shine"></div>
              <div class="srp-skeleton__line srp-skeleton__line--xl srp-skeleton__shine"></div>
              <div class="srp-skeleton__cta srp-skeleton__shine"></div>
            </div>
            <div class="srp-skeleton__card">
              <div class="srp-skeleton__image srp-skeleton__shine"></div>
              <div class="srp-skeleton__line srp-skeleton__line--sm srp-skeleton__shine"></div>
              <div class="srp-skeleton__line srp-skeleton__line--md srp-skeleton__shine"></div>
              <div class="srp-skeleton__line srp-skeleton__line--lg srp-skeleton__shine"></div>
              <div class="srp-skeleton__line srp-skeleton__line--xl srp-skeleton__shine"></div>
              <div class="srp-skeleton__cta srp-skeleton__shine"></div>
            </div>
          </div>
        </div>
        <!-- Sticky search bar injected by srp-main.js before #srp-results -->
        <main id="srp-results" class="srp-results"></main>
      </div>
    </div>
  </body>
</html>
